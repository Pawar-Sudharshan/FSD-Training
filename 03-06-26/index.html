<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap task</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6F" crossorigin="anonymous">
</head>

<body>

    <!-- Create a container with three columns that stack vertically on mobile, two-per-row on tablets, 
and three-per-row on desktops. -->

    <div class="container">
        <div class="row">

            <div class="col-12 col-md-6 col-lg-4">
                <h1>Column 1</h1>
                <p>This is the first column.</p>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <h1>Column 2</h1>
                <p>This is the second column.</p>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <h1>Column 3</h1>
                <p>This is the third column.</p>
            </div>

        </div>
    </div>


    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4"
        crossorigin="anonymous"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather API</title>
    <style>
        .container {
            text-align: center;
            margin-top: 50px;

        }
        .data {
            margin-top: 50px;
            display: flex;
            justify-content: center;
        }
        table {
            border-collapse: collapse;
            width: 80%;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>Weather API</h1>
        <input type="text" id="city" placeholder="Enter city name">
        <button onclick="weather()">Get Weather</button>
    </div>
    <div class="data">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Temperature</th>
                    <th>Weather</th>
                </tr>
            </thead>
            <tbody id="weather-data">
            </tbody>
        </table>

    </div>

    <script src="script.js"></script>
</body>
</html>
